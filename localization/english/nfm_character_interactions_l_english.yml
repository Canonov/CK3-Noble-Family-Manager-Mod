l_english:

 ################################
 # GRANT NOBILITY TO LOWBORN
 ################################

 nfm_int_elevate_lowborn: "Grant Nobility"
 nfm_int_elevate_lowborn_desc: "Raise [recipient.GetShortUIName] from [lowborn|E] obscurity to the ranks of the [nobility|E]. A name, a lineage, a [dynasty|E], From the word of a [actor.GetTitleAsNameNoTooltip] alone."
 nfm_elevate_lowborn_tt: "[recipient.GetShortUIName] will found [recipient.GetHerHis] own [dynasty|E], entering the ranks of the [nobility|E]"
 
 ## Post Elevate Toast
 nfm_toast_elevated_lowborn: "Lowborn Elevated to Nobility"
 nfm_toast_elevated_lowborn_desc: "[recipient.GetName] has been elevated as the head of the [new_dynasty.GetName] [dynasty|E]"
 nfm_toast_elevated_lowborn_tt: "An oath has been sworn and they are officially now [nobility|E]"

 ################################
 # ELEVATE AS NOBLE FAMILY HEAD
 ################################
 
 nfm_int_grant_house: "Elevate as Noble Family Head"
 nfm_int_grant_house_desc: "Elevate [recipient.GetShortUIName] to the position of a [noble_family|E] head, creating a [cadet_branch|E] if necessary"
 nfm_int_grant_house_costs_tt: "Will gain the [prestige|E], [influence|E] and part of the [gold|E] costs"
 
 ################################
 # REVOKE NOBLE FAMILY STATUS
 ################################
 
 nfm_int_revoke_house: "Revoke Noble Family Status"
 nfm_int_revoke_house_desc: "For their heinous acts against the realm, the time has come to strip the entire [recipient.GetDynastyHouseName] [house|E] of their [noble_family|E] status!"
 nfm_int_revoke_house_options: "Additional Options"
 nfm_int_revoke_house_not_family_tt: "You cannot revoke the [noble_family|E] status of your own relatives"
 nfm_int_revoke_house_auto_accept_reason: "Being landless and [imprisoned|E], they are naturally powerless to refuse"
 nfm_int_revoke_no_reason_tyranny_tt: "#N @warning_icon! [tyranny|E] was doubled for acting without a valid reason!#!"

 ## Revoke Options ##

 # Sack Estate
 nfm_int_revoke_sack: "Raid their Estates"
 nfm_int_revoke_sack_desc: "You will raid and sack their [estate|E] for more [gold_i] [gold|E], though it may be seen as [tyrannical|E]"

 # Eradication Order
 nfm_int_revoke_eradicate: "Eradication Order"
 nfm_int_revoke_eradicate_desc: "Adult [house|E] members of the dominant gender who are direct parents or children of [recipient.GetShortUINameNoTooltip] will be [executed|E]. Others will be [banished|E]."
 nfm_int_revoke_eradicate_tt: "Adult [house|E] members will be executed and others banished"
 nfm_int_revoke_eradicate_kill_tt: "#N @warning_icon! Adult members (16-69) of the dominant gender who are direct parents or children will be #bold executed.#!"
 nfm_int_revoke_eradicate_banish_tt: "Elderly (70+), non-dominant gender, and spouses will be #bold banished."
 nfm_int_revoke_eradicate_exclusive_tt: "Mutually exclusive with #POE $nfm_int_revoke_banish$#!"
 nfm_int_revoke_eradicate_requires_sack_tt: "You must also #POE $nfm_int_revoke_sack$#!"
 nfm_int_revoke_eradicate_traits_tt: "You must have the [GetDynastyPerk('ep3_administrative_legacy_5').GetName] perk or be [GetTrait('vengeful').GetName(GetNullCharacter)], [GetTrait('sadistic').GetName(GetNullCharacter)] or [GetTrait('arbitrary').GetName(GetNullCharacter)]"
 
 # Exile House
 nfm_int_revoke_banish: "Order Exile"
 nfm_int_revoke_banish_desc: "All members of the [house|E] of [recipient.GetDynastyHouseName] will be [banished|E]"
 nfm_int_revoke_banish_exclusive_tt: "Mutually exclusive with #POE $nfm_int_revoke_eradicate$#!"

 ################################
 # DISSOLVE DYING NOBLE HOUSE
 ################################

 nfm_int_dissolve_house: "Dissolve Dying House"
 nfm_int_dissolve_house_desc: "The [recipient.GetDynastyHouseName] [house|E] has reached the end of its line. With it unlikely to carry on the family name, we can peacefully dissolve their [noble_family|E] status and allow the remaining members to live out their days in peace."
 nfm_int_dissolve_house_auto_accept_reason: "With no future for their house, they have no choice but to accept the inevitable dissolution"

 ## Dying house criteria tooltips
 # Living Members
 nfm_loc_dissolve_house_few_members: "[DYNASTY_HOUSE.GetName] must have #bold 5 or fewer#! living members"
 nfm_loc_dissolve_house_few_members_not: "[DYNASTY_HOUSE.GetName] has 5 or fewer living members"
 # Fertile Members
 nfm_loc_dissolve_house_no_fertile: "[DYNASTY_HOUSE.GetName] must have #bold no members#! likely to produce children"
 nfm_loc_dissolve_house_has_fertile: "[DYNASTY_HOUSE.GetName] have no members likely to produce children"
 # No Dominant Marriages
 nfm_loc_dissolve_house_no_dominant_marriages: "[DYNASTY_HOUSE.GetName] must have #bold no members#! married dominantly (whose children would join this house)"
 nfm_loc_dissolve_house_has_dominant_marriages: "[DYNASTY_HOUSE.GetName] have no members married dominantly (whose children would join this house)"

 ################################
 # INVITE FOREIGN HOUSE HEAD
 ################################

 nfm_int_invite_foreign_house_head: "Invite Foreign Noble House"
 nfm_int_invite_foreign_house_head_desc: "Extend an invitation to [recipient.GetShortUIName], the head of [recipient.GetDynastyHouseName], to bring [recipient.GetHerHis] [house|E] to our realm and become a [noble_family|E]."
 nfm_int_invite_foreign_house_head_extra_icon: "$hook_extra_icon$"

 ## Send Options
 nfm_int_invite_generous_offer: "Generous Compensation"
 nfm_int_invite_generous_offer_desc: "Offer additional [gold_i][gold|E] to sweeten the deal"

 ## Validity Tooltips
 nfm_int_invite_house_not_landed_your_realm_tt: "[recipient.GetDynastyHouseName] must not already have landed members in your realm"
 nfm_int_invite_house_not_landed_their_realm_tt: "[recipient.GetDynastyHouseName] must not already have landed members in their realm"

