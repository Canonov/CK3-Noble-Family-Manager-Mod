l_english:

 ################################
 # DECISIONS
 ################################

 ## Ban or Unban Dynasty from Cadet Branches
 nfm_cb_decision_toggledyncadetban: "Ban further Cadet Branches"
 nfm_cb_decision_toggledyncadetban_disclaimer: "\n\nNote that this may not work if you have any other mods that modify cadet branch creation."
 nfm_cb_decision_toggledyncadetban_desc: "There is no need for further divisions of our dynasty. $nfm_cb_decision_toggledyncadetban_disclaimer$"
 nfm_cb_decision_toggledyncadetban_confirm: "Ban Cadet Branches"
 nfm_cb_decision_toggledyncadetban_tooltip: "[dynasty|E] members will no longer be allowed to create [cadet_branches|E]"

 nfm_cb_decision_toggledyncadetban_unban: "Allow the creation of Cadet Branches"
 nfm_cb_decision_toggledyncadetban_unban_desc: "Our dynasty should be free to create [cadet_branches|E] once more! $nfm_cb_decision_toggledyncadetban_disclaimer$"
 nfm_cb_decision_toggledyncadetban_unban_confirm: "Unban Cadet Branches"
 nfm_cb_decision_toggledyncadetban_unban_tooltip: "[dynasty|E] members will be allowed to create [cadet_branches|E] again"

 ## For the Vanilla Create Branch
