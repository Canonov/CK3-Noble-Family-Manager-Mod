l_english:

 ################################
 # GAME CONCEPTS
 ################################

 ## House Types Concept ##
 game_concept_nfm_house_types: "Noble House Types"
 game_concept_nfm_house_type: "House Type"
 game_concept_nfm_house_types_desc: "Each [noble_family|E] belongs to one of six types, reflecting their area of expertise.\n\nEvery type comes with an associated [modifier|E].\n#weak (For example the [GetStaticModifier('nfm_modifier_housetype_steward').GetNameWithTooltip] modifier of the $game_concept_nfm_steward_house$)#! \n\n#S Available House Types:#!\n$EFFECT_LIST_BULLET$[nfm_steward_house|E]\n$EFFECT_LIST_BULLET$[nfm_martial_house|E]\n$EFFECT_LIST_BULLET$[nfm_learning_house|E]\n$EFFECT_LIST_BULLET$[nfm_intrigue_house|E]\n$EFFECT_LIST_BULLET$[nfm_diplomatic_house|E]\n$EFFECT_LIST_BULLET$[nfm_foreign_house|E]"

 ## Family Sizes Concept ##
 game_concept_nfm_family_sizes: "Family Sizes"
 game_concept_nfm_family_size: "Family Size"
 game_concept_nfm_family_sizes_desc: "When elevating a new [noble_family|E], they will arrive in one of three $game_concept_nfm_family_sizes$:\n\n#bold Small Family (20% chance):#! Only the head and their children arrive.\n\n#bold Medium Family (60% chance):#! The head, aging parents, siblings, and children — about a dozen family members.\n\n#bold Large Family (20% chance):#! An extended clan including parents, siblings, children, and cousins.\n\nLarger families provide more potential [councillors|E], [governors|E], and [knights|E]."

 ################################
 # HOUSE TYPE CONCEPTS
 ################################

 ## Steward House Concept ##
 game_concept_nfm_steward_house: "Steward House"
 game_concept_nfm_steward_house_desc: "A family of capable administrators, skilled in managing lands and collecting taxes.\n\nMembers excel in [stewardship|E] and make excellent [councillors|E] for financial tasks.\n#weak \n- They will gain the $nfm_modifier_housetype_steward_tt$ [modifier|E].#!"

 ## Martial House Concept ##
 game_concept_nfm_martial_house: "Martial House"
 game_concept_nfm_martial_house_desc: "A family of proven warriors and military leaders with talent for command.\n\nMembers excel in [martial|E] and make formidable [knights|E] and [commanders|E].\n#weak \n- They will gain the $nfm_modifier_housetype_martial_tt$ [modifier|E].#!"

 ## Learning House Concept ##
 game_concept_nfm_learning_house: "Learning House"
 game_concept_nfm_learning_house_desc: "A family of intellectuals and scholars devoted to the pursuit of knowledge.\n\nMembers excel in [learning|E] and make excellent [court_chaplains|E] and advisors.\n#weak \n- They will gain the $nfm_modifier_housetype_learning_tt$ [modifier|E].#!"

 ## Intrigue House Concept ##
 game_concept_nfm_intrigue_house: "Intrigue House"
 game_concept_nfm_intrigue_house_desc: "A family of cunning operatives skilled in espionage and information gathering.\n\nMembers excel in [intrigue|E] and make effective [Concept('spymaster', 'Spymasters')|E] and covert [agents|E].\n#weak \n- They will gain the $nfm_modifier_housetype_intrigue_tt$ [modifier|E].#!"

 ## Diplomatic House Concept ##
 game_concept_nfm_diplomatic_house: "Diplomatic House"
 game_concept_nfm_diplomatic_house_desc: "A family of skilled diplomats with talent for negotiation and statecraft.\n\nMembers excel in [diplomacy|E] and make excellent [chancellors|E] and ambassadors.\n#weak \n- They will gain the $nfm_modifier_housetype_diplomatic_tt$ [modifier|E].#!"

 ## Foreign House Concept ##
 game_concept_nfm_foreign_house: "Foreign House"
 game_concept_nfm_foreign_house_desc: "A family from the fringes of the [realm|E], bringing unique talents.\n\nMembers bring various [educations|E] and will be content under a [liege|E] of differing culture.\n#weak \n- They will gain the $nfm_modifier_housetype_foreign_tt$ [modifier|E].#!"

 ################################
 # NOBLE HOUSE TYPES
 ################################

 ## MISC ##
 nfm_house_unknown: "UNKNOWN HOUSE TYPE"

 ## [1] Stewardship Houses ##

 nfm_house_steward_name: "Capable Stewards"
 nfm_house_steward_desc: "This family has demonstrated exceptional competence in managing lands, collecting taxes, and organizing the affairs of the realm."
 nfm_house_steward_tooltip: "#T $game_concept_nfm_steward_house$#!\n$game_concept_nfm_steward_house_desc$"

 ## [2] Martial Houses ##

 nfm_house_martial_name: "Soldiers and Commanders"
 nfm_house_martial_desc: "A family of proven warriors and military leaders, their martial prowess has earned them a place among the nobility. They have served with distinction in battle and shown talent for command."
 nfm_house_martial_tooltip: "#T $game_concept_nfm_martial_house$#!\n$game_concept_nfm_martial_house_desc$"
 # Samurai for Japanese
 nfm_house_martial_name_samurai: "Minor Samurai"

 ## [3] Learning Houses ##

 nfm_house_learning_name: "Learned Scholars"
 nfm_house_learning_desc: "A family of intellectuals and scholars has distinguished themselves through their pursuit of knowledge and wisdom."
 nfm_house_learning_tooltip: "#T $game_concept_nfm_learning_house$#!\n$game_concept_nfm_learning_house_desc$"
 # Confucian Scholars for Chinese Chars
 nfm_house_learning_name_confucian: "Confucian Scholars"

 ## [4] Intrigue Houses ##

 nfm_house_intrigue_name: "Trustworthy Spies"
 nfm_house_intrigue_desc: "A family of cunning operatives and information brokers, their skill in intrigue and espionage has proven invaluable."
 nfm_house_intrigue_tooltip: "#T $game_concept_nfm_intrigue_house$#!\n$game_concept_nfm_intrigue_house_desc$"

 ## [5] Diplomatic Houses ##

 nfm_house_diplomatic_name: "Diplomatic Envoys"
 nfm_house_diplomatic_desc: "A family of skilled diplomats and envoys, their talent for negotiation and statecraft has earned them recognition. They excel at chancellory roles and making allies around the realm."
 nfm_house_diplomatic_tooltip: "#T $game_concept_nfm_diplomatic_house$#!\n$game_concept_nfm_diplomatic_house_desc$"

 ## [6] Foreign/Minority Houses ##

 nfm_house_foreign_name: "Talented Minorities"
 nfm_house_foreign_name_dyn: "Talented [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]"
 nfm_house_foreign_desc: "From the far corners of the realm, a family of different heritage has proven their worth through service and skill. They bring unique talents to the [ROOT.Char.Custom('GetRealmRank')] court."
 nfm_house_foreign_tooltip: "#T $game_concept_nfm_foreign_house$#!\n$game_concept_nfm_foreign_house_desc$"
 nfm_house_foreign_diff_culture_tooltip: "#weak $nfm_house_foreign_name$:#! The house will be chosen from one of your [realm|E] [counties|E] of a different [culture|E], if their [faith|E] is [faith_astray|E] or [faith_righteous|E] they will be allowed to keep their [faith|E]."


 ################################
 # EVENT DESCRIPTIONS
 ################################
 ## House Type Descriptions ##
 nfm_house_steward_event_desc: "The [ROOT.Char.GetDynastyHouseName] have proven themselves capable administrators. Their ledgers are immaculate, their estates well-managed, and their reputation for financial acumen precedes them."
 nfm_house_martial_event_desc: "[ROOT.Char.GetName] and [ROOT.Char.GetHerHis] kin have shed blood in service to the realm. They carry themselves with the discipline of seasoned warriors, their martial prowess evident in every movement."
 nfm_house_learning_event_desc: "The [ROOT.Char.GetDynastyHouseName] are known for their scholarly pursuits and wisdom. [ROOT.Char.GetShortUIName] speaks with the measured confidence of one who has devoted [ROOT.Char.GetHerHis] life to knowledge."
 nfm_house_intrigue_event_desc: "Little is known of the [ROOT.Char.GetDynastyHouseName] publicly, which is perhaps their greatest asset. They have served in the shadows, their loyalty proven through discretion and results."
 nfm_house_diplomatic_event_desc: "The [ROOT.Char.GetDynastyHouseName] are masters of negotiation and statecraft. [ROOT.Char.GetFirstName] speaks with the eloquence of a seasoned diplomat."
 nfm_house_foreign_event_desc: "The [ROOT.Char.GetDynastyHouseName] hail from the [ROOT.Char.MakeScope.Var('nfm_origin_county').Title.GetName], bringing their [ROOT.Char.GetCulture.GetCollectiveNoun] customs and [ROOT.Char.GetFaith.GetName] faith. Outsiders, perhaps, but their talents speak for themselves."
 ## Family Size Descriptions ##
 nfm_familysize_small_event_desc: "[ROOT.Char.GetFirstName] stands with only [ROOT.Char.GetHerHis] children at [ROOT.Char.GetHerHis] side. A small household, but sometimes the mightiest oaks grow from a single acorn."
 nfm_familysize_medium_event_desc: "Behind [ROOT.Char.GetFirstName] stand [ROOT.Char.GetHerHis] aging parents, siblings, and a gaggle of children. A respectable household of perhaps a dozen souls."
 nfm_familysize_large_event_desc: "The [ROOT.Char.GetDynastyHouseName] have come in force. Parents, siblings, children, cousins — a veritable clan fills the chamber, each eager to share in the family's rising fortunes."