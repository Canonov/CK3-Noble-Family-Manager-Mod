l_english:

 ################################
 # ELEVATE A NOBLE FAMILY
 ################################
 
 ## Main Decision ##
 
 nfm_decision_elevate_nobles: "Elevate a Noble Family"
 nfm_decision_elevate_nobles_desc: "A well-oiled administration requires skilled nobles. Among the families that serve under me, I find a lack of capable individuals. \n\nI shall send out a summons to the minor nobility that I am looking for suitable candidates to elevate in status to a proper [noble_family|E] capable of receiving [governorship|E] positions."
 nfm_decision_elevate_nobles_tooltip: "A new [noble_family|E] will be created and elevated to serve in your court. The size and composition of the family will vary based on your realm's current needs and circumstances."
 nfm_decision_elevate_nobles_confirm: "Send a Summons"

 ## Family Size Tooltips ##
 
 nfm_decision_elevate_nobles_small_tt: "A Small [house|E] will be found, containing only the [house_head|E] and their children"
 nfm_decision_elevate_nobles_medium_tt: "A Moderately Sized [house|E] will be found, with some siblings and children"
 nfm_decision_elevate_nobles_large_tt: "A Larger [house|E] will be found, with many siblings and children"

 ## Post Creation Toast ##
 
 nfm_toast_elevated: "Family Elevated to Noble Status"
 nfm_toast_elevated_desc: "[new_house_head.GetName] has been elevated as the head of the [new_title.GetNameNoTier]"
 nfm_toast_elevated_tt: "This new [noble_family|E] will serve your realm and may provide valuable [councillors|E], [governors|E] and [knights|E]"

 ################################
 # NOBLE HOUSE TYPES
 ################################
 
 ## Stewardship Houses ##
 
 nfm_house_steward_name: "Capable Stewards"
 nfm_house_steward_desc: "This family has demonstrated exceptional competence in managing lands, collecting taxes, and organizing the affairs of the realm."
 nfm_house_steward_tooltip: "Members of this house excel in [stewardship|E] and make excellent [councillors|E] for financial and developmental tasks"
 
 ## Martial Houses ##
 
 nfm_house_martial_name: "Soldiers and Commanders"
 nfm_house_martial_desc: "A family of proven warriors and military leaders, their martial prowess has earned them a place among the nobility. They have served with distinction in battle and shown talent for command."
 nfm_house_martial_tooltip: "Members of this house excel in [martial|E] skills and make formidable [knights|E] and [commanders|E]"
 
 ## Learning Houses ##
 
 nfm_house_learning_name: "Learned Scholars"
 nfm_house_learning_desc: "A family of intellectuals and scholars has distinguished themselves through their pursuit of knowledge and wisdom."
 nfm_house_learning_tooltip: "Members of this house excel in [learning|E] and make excellent [court_chaplains|E] and cultural advisors"
 
 ## Intrigue Houses ##
 
 nfm_house_intrigue_name: "Trustworthy Spies"
 nfm_house_intrigue_desc: "A family of cunning operatives and information brokers, their skill in intrigue and espionage has proven invaluable."
 nfm_house_intrigue_tooltip: "Members of this house excel in [intrigue|E] and make effective [Concept('spymaster', 'Spymasters')|E] and covert agents"
 
 ## Foreign/Minority Houses ##
 
 nfm_house_foreign_name: "Talented Minorities"
 nfm_house_foreign_desc: "TBD will write later and make dynamic"
 nfm_house_foreign_tooltip: "TBD will write later and make dynamic"
