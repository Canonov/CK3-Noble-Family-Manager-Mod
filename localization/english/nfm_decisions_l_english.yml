l_english:

 ################################
 # ELEVATE A NOBLE FAMILY
 ################################
 
 ## Main Decision ##
 
 nfm_decision_elevate_nobles: "Elevate a Noble Family"
 nfm_decision_elevate_nobles_desc: "A well-oiled administration requires skilled nobles. Among the families that serve under me, I find a lack of capable individuals.\n\nI shall send out a summons to the minor nobility that I am looking for suitable candidates to elevate in status to a proper [noble_family|E] capable of receiving [governorship|E] positions.\n\nThe new family will have a specific [Concept('nfm_house_type', 'House Type')|E] and [Concept('nfm_family_size', 'Family Size')|E]."
 nfm_decision_elevate_nobles_desc.recently_founded_admin_cooldown: "#weak \n\n(Because you've recently founded your [ROOT.Char.GetGovernment.GetName] Government, the cooldown will only be #V [SCOPE.ScriptValue('nfm_value_elevate_nobles_cooldown_days')|0]#! days)#!"
 nfm_decision_elevate_nobles_tooltip: "A new [noble_family|E] will be created and elevated to serve in your court. The composition of the family will vary based on your needs."
 nfm_decision_elevate_nobles_confirm: "Send a Summons"
 # Cultural Titles
 nfm_decision_elevate_nobles_clan: "Elevate a Minor Clan"

 ## Family Size Tooltips ##
 nfm_decision_elevate_nobles_sizes_tt: "#S Family Size Chances are as follows:#!\n\t#F #E $EFFECT_LIST_BULLET$ #EMP 20%#!#!: $nfm_decision_elevate_nobles_small_tt$\n\t#E $EFFECT_LIST_BULLET$ #EMP 60%#!#!: $nfm_decision_elevate_nobles_medium_tt$\n\t#E $EFFECT_LIST_BULLET$ #EMP 20%#!#!: $nfm_decision_elevate_nobles_large_tt$\n#!"
 nfm_decision_elevate_nobles_small_tt: "A small family will be found, containing only the head and their children"
 nfm_decision_elevate_nobles_medium_tt: "A moderately sized family will be found, with some siblings and children"
 nfm_decision_elevate_nobles_large_tt: "A larger family will be found, with many siblings and children"

 nfm_decision_elevate_nobles_modifier_tt: "This [house|E] will gain a special [modifier|E] depending on their [nfm_house_type|E]"
 nfm_decision_elevate_nobles_getmerit_tt: "#weak Because of your [THIS.Char.GetGovernment.GetNameNoTooltip] Government:#! Members of the new family will be granted @merit_icon![merit|E] and have already passed some @provincial_exam_icon![examinations|E]"
 nfm_decision_elevate_nobles_tt: "A new [house|E] with a specific [nfm_house_type|E] will be generated and granted a [noble_family|E] [title|E]"

 ## Post Creation Toast ##
 
 nfm_toast_elevated: "Family Elevated to Noble Status"
 nfm_toast_elevated_desc: "[new_house_head.GetFirstName] has been elevated as the head of the [new_title.GetNameNoTier]"
 nfm_toast_elevated_tt: "This new [noble_family|E] will serve your realm and may provide valuable [councillors|E], [governors|E] and [knights|E]"
