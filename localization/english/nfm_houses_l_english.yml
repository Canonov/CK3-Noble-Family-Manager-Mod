l_english:

 ################################
 # NOBLE HOUSE TYPES
 ################################

 ## MISC ##
 nfm_house_unknown: "UNKNOWN HOUSE TYPE"

 ## [1] Stewardship Houses ##

 nfm_house_steward_name: "Capable Stewards"
 nfm_house_steward_desc: "This family has demonstrated exceptional competence in managing lands, collecting taxes, and organizing the affairs of the realm."
 nfm_house_steward_tooltip: "Members of this house excel in [stewardship|E] and make excellent [councillors|E] for financial and developmental tasks"

 ## [2] Martial Houses ##

 nfm_house_martial_name: "Soldiers and Commanders"
 nfm_house_martial_desc: "A family of proven warriors and military leaders, their martial prowess has earned them a place among the nobility. They have served with distinction in battle and shown talent for command."
 nfm_house_martial_tooltip: "Members of this house excel in [martial|E] skills and make formidable [knights|E] and [commanders|E]"
 # Samurai for Japanese
 nfm_house_martial_name_samurai: "Minor Samurai"

 ## [3] Learning Houses ##

 nfm_house_learning_name: "Learned Scholars"
 nfm_house_learning_desc: "A family of intellectuals and scholars has distinguished themselves through their pursuit of knowledge and wisdom."
 nfm_house_learning_tooltip: "Members of this house excel in [learning|E] and make excellent [court_chaplains|E] and cultural advisors"
 # Confucian Scholars for Chinese Chars
 nfm_house_learning_name_confucian: "Confucian Scholars"

 ## [4] Intrigue Houses ##

 nfm_house_intrigue_name: "Trustworthy Spies"
 nfm_house_intrigue_desc: "A family of cunning operatives and information brokers, their skill in intrigue and espionage has proven invaluable."
 nfm_house_intrigue_tooltip: "Members of this house excel in [intrigue|E] and make effective [Concept('spymaster', 'Spymasters')|E] and covert agents"

 ## [5] Reserved for Diplomatic ##

 ## [6] Foreign/Minority Houses ##

 nfm_house_foreign_name: "Talented Minorities"
 nfm_house_foreign_name_dyn: "Talented [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]"
 nfm_house_foreign_desc: "From the far corners of the realm, a family of different heritage has proven their worth through service and skill. They bring unique talents to the [ROOT.Char.Custom('GetRealmRank')] court."
 nfm_house_foreign_tooltip: "Members of this house bring various educations and may have unique cultural skills"
 nfm_house_foreign_diff_culture_tooltip: "#weak $nfm_house_foreign_name$:#! The house will be chosen from one of your [realm|E] [counties|E] of a different [culture|E], if their [faith|E] is [faith_astray|E] or greater they will be allowed to keep their [faith|E]"


 ################################
 # EVENT DESCRIPTIONS
 ################################
 nfm_house_steward_event_desc: "The [ROOT.Char.GetDynastyHouseName] have proven themselves capable administrators. Their ledgers are immaculate, their estates well-managed, and their reputation for financial acumen precedes them."
 nfm_house_martial_event_desc: "[ROOT.Char.GetName] and [ROOT.Char.GetHerHis] kin have shed blood in service to the realm. They carry themselves with the discipline of seasoned warriors, their martial prowess evident in every movement."
 nfm_house_learning_event_desc: "The [ROOT.Char.GetDynastyHouseName] are known for their scholarly pursuits and wisdom. [ROOT.Char.GetName] speaks with the measured confidence of one who has devoted [ROOT.Char.GetHerHis] life to knowledge."
 nfm_house_intrigue_event_desc: "Little is known of the [ROOT.Char.GetDynastyHouseName] publicly, which is perhaps their greatest asset. They have served in the shadows, their loyalty proven through discretion and results."
 nfm_house_foreign_event_desc: "The [ROOT.Char.GetDynastyHouseName] hail from the [ROOT.Char.MakeScope.Var('nfm_origin_county').Title.GetName], bringing with them their [ROOT.Char.GetCulture.GetCollectiveNoun] customs and [ROOT.Char.GetFaith.GetName] faith. Their talents have caught my attention."
