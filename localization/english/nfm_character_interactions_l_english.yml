 ## Messages
 nfm_msg_invited_house_head: "Foreign House Recruited"
 nfm_msg_house_head_left_realm: "House Head Departed"
 nfm_msg_house_head_left_realm_desc: "[recipient.GetName] has left your realm to join [actor.GetName]"
 nfm_msg_invite_declined: "Invitation Declined"
 nfm_msg_invite_declined_desc: "[recipient.GetName] has declined your invitation to join your realm"

