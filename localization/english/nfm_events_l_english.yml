 nfm_events_elevate_nobles.1.d.house_desc: "[new_house_head.Custom('nfm_loc_house_housetype_event_desc')]"
 nfm_events_elevate_nobles.1.d.familysize_desc: "[new_house_head.Custom('nfm_loc_familysize_event_desc')]"
 nfm_events_elevate_nobles.1.d.housetype_desc: "#V House Type:#! [new_house_head.Custom('nfm_loc_house_type_concept')]"

 ## Options ##
 nfm_events_elevate_nobles.1.a: "The [new_house_head.GetDynastyHouseName] will make a fine addition to the realm."
 nfm_events_elevate_nobles.1.b: "These [new_house_head.Custom2('InsultNounPlural', ROOT.Char)] are of no use to me!"
 nfm_events_elevate_nobles.1.b.flavor: "The [new_house_head.GetDynastyHouseName] will never be heard from again."

 ## Tooltips ##
 nfm_events_elevate_nobles.1.tt.becomes_head: "[new_house_head.GetName] will become head of a new [noble_family|E]"
